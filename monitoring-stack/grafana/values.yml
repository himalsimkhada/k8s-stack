replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

sidecar:
  dashboards:
    enabled: false
  datasources:
    enabled: false
  alerts:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 100Mi

ingress:
  enabled: true
  hosts:
    - grafana.local

persistence:
  type: pvc
  enabled: true
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  size: 10Gi

admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

smtp:
  existingSecret: grafana-smtp-secret
  userKey: "user"
  passwordKey: "password"

extraConfigmapMounts:
  - name: grafana-datasources
    configMap: grafana-datasources
    mountPath: /etc/grafana/provisioning/datasources
    readOnly: true

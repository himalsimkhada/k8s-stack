alertmanager:
  enabled: true
  # config:
  #   route:
  #     receiver: MSTeams
  #     routes:
  #     - matchers:
  #         - severity="warning"
  #       receiver: MSTeams
  #   receivers:
  #   - name: 'null'
  #   - name: 'MSTeams'
  #     webhook_configs:
  #       - url: 'http://prometheus-msteams:2000/alertmanager'
  alertmanagerSpec:
    replicas: 1
    retention: 24h
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

grafana:
  enabled: false
  
prometheus:
  enabled: true
  ingress:
    enabled: true
    hosts:
      - prometheus.local
  prometheusSpec:
    replicas: 1
    retention: 7d
    externalUrl: https://prometheus.local
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 15Gi
